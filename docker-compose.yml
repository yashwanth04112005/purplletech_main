version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: si_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-si_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-si_pass}
      POSTGRES_DB: ${POSTGRES_DB:-store_intelligence}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U si_user -d store_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: si_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: si_api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://si_user:si_pass@postgres:5432/store_intelligence
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: si_dashboard
    environment:
      API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg_data:
